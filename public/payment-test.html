<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clinic POS — Payment Test</title>
  <script src="https://app.sandbox.midtrans.com/snap/snap.js" 
          data-client-key="Mid-client-nR8yaxueihgRienD"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; margin-bottom: 16px;
      outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    button {
      width: 100%; padding: 12px;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-pay {
      background: #3b82f6; color: white;
      margin-bottom: 10px;
    }
    .btn-pay:hover { background: #2563eb; }
    .btn-pay:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-status {
      background: #f3f4f6; color: #374151;
    }
    .btn-status:hover { background: #e5e7eb; }

    .status-box {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status-pending  { background: #fef9c3; border: 1px solid #fde047; color: #713f12; }
    .status-lunas    { background: #dcfce7; border: 1px solid #86efac; color: #14532d; }
    .status-error    { background: #fee2e2; border: 1px solid #fca5a5; color: #7f1d1d; }

    .detail-box {
      background: #f9fafb;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .detail-row {
      display: flex; justify-content: space-between;
      font-size: 13px; color: #555; margin-bottom: 6px;
    }
    .detail-row:last-child { margin-bottom: 0; font-weight: 600; color: #1a1a1a; }
    .badge {
      display: inline-block;
      padding: 2px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 600;
    }
    .badge-pending  { background: #fef9c3; color: #713f12; }
    .badge-lunas    { background: #dcfce7; color: #14532d; }
    .badge-cancelled{ background: #fee2e2; color: #7f1d1d; }
  </style>
</head>
<body>
<div class="card">
  <h1>🏥 Smart Clinic POS</h1>
  <p class="subtitle">Simulasi Payment — Sandbox Mode</p>

  <label>Transaction ID</label>
  <input 
    type="text" 
    id="transactionId" 
    placeholder="Paste transaction ID di sini..."
    value="eae78049-cb06-40f7-b93b-8cdca6f484e2"
  />

  <!-- Detail transaksi (muncul setelah cek status) -->
  <div class="detail-box" id="detailBox">
    <div class="detail-row">
      <span>Status</span>
      <span id="detailStatus">-</span>
    </div>
    <div class="detail-row">
      <span>Metode</span>
      <span id="detailMethod">-</span>
    </div>
    <div class="detail-row">
      <span>Total</span>
      <span id="detailTotal">-</span>
    </div>
  </div>

  <button class="btn-pay" id="btnPay" onclick="bayar()">
    💳 Bayar Sekarang
  </button>

  <button class="btn-status" onclick="cekStatus()">
    🔄 Cek Status Transaksi
  </button>

  <div class="status-box" id="statusBox"></div>
</div>

<script>
  const BASE_URL = 'http://localhost:3000/api';

  function formatRupiah(amount) {
    return 'Rp ' + Number(amount).toLocaleString('id-ID');
  }

  function showStatus(message, type) {
    const box = document.getElementById('statusBox');
    box.style.display = 'block';
    box.className = 'status-box status-' + type;
    box.innerHTML = message;
  }

  function getBadge(status) {
    const map = {
      'PENDING_PAYMENT': ['pending', 'Menunggu Pembayaran'],
      'LUNAS': ['lunas', 'LUNAS ✅'],
      'CANCELLED': ['cancelled', 'Dibatalkan'],
      'DRAFT': ['pending', 'Draft'],
    };
    const [cls, label] = map[status] || ['pending', status];
    return `<span class="badge badge-${cls}">${label}</span>`;
  }

  async function cekStatus() {
    const transactionId = document.getElementById('transactionId').value.trim();
    if (!transactionId) return showStatus('Masukkan Transaction ID dulu!', 'error');

    showStatus('Mengecek status...', 'pending');

    try {
      const res = await fetch(`${BASE_URL}/payment/status/${transactionId}`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Gagal cek status');

      const { status, total, paymentMethod } = data.data;

      // Tampilkan detail box
      const detailBox = document.getElementById('detailBox');
      detailBox.style.display = 'block';
      document.getElementById('detailStatus').innerHTML = getBadge(status);
      document.getElementById('detailMethod').textContent = paymentMethod ?? '-';
      document.getElementById('detailTotal').textContent = formatRupiah(total);

      if (status === 'LUNAS') {
        showStatus('✅ Transaksi sudah LUNAS!', 'lunas');
        document.getElementById('btnPay').disabled = true;
      } else {
        showStatus(`Status: ${status}`, 'pending');
      }

    } catch (err) {
      showStatus('❌ Error: ' + err.message, 'error');
    }
  }

  async function bayar() {
    const transactionId = document.getElementById('transactionId').value.trim();
    if (!transactionId) return showStatus('Masukkan Transaction ID dulu!', 'error');

    const btn = document.getElementById('btnPay');
    btn.disabled = true;
    btn.textContent = '⏳ Memproses...';
    showStatus('Menghubungi server...', 'pending');

    try {
      // 1. Request snap token dari backend
      const res = await fetch(`${BASE_URL}/payment/tokenizer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transactionId }),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Gagal generate token');

      const { snapToken, total } = data.data;
      showStatus(`Token didapat! Total: ${formatRupiah(total)}. Membuka payment...`, 'pending');

      // 2. Buka Snap popup Midtrans
      window.snap.pay(snapToken, {
        onSuccess: function(result) {
          console.log('✅ Payment success:', result);
          showStatus('✅ Pembayaran berhasil! Status akan update otomatis via webhook.', 'lunas');
          btn.textContent = '✅ Pembayaran Berhasil';
          setTimeout(cekStatus, 2000);
        },
        onPending: function(result) {
          console.log('⏳ Payment pending:', result);
          showStatus('⏳ Pembayaran pending — menunggu konfirmasi.', 'pending');
          btn.disabled = false;
          btn.textContent = '💳 Bayar Sekarang';
        },
        onError: function(result) {
          console.log('❌ Payment error:', result);
          showStatus('❌ Pembayaran gagal: ' + JSON.stringify(result), 'error');
          btn.disabled = false;
          btn.textContent = '💳 Bayar Sekarang';
        },
        onClose: function() {
          showStatus('ℹ️ Popup ditutup sebelum pembayaran selesai.', 'pending');
          btn.disabled = false;
          btn.textContent = '💳 Bayar Sekarang';
        },
      });

    } catch (err) {
      showStatus('❌ Error: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = '💳 Bayar Sekarang';
    }
  }

  // Auto cek status saat halaman load
  window.onload = () => {
    const id = document.getElementById('transactionId').value;
    if (id) setTimeout(cekStatus, 500);
  };
</script>
</body>
</html>
